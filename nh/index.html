<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nh.helixa.xyz</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #111827 0%, #050816 55%, #02030a 100%);
        color: #e5e7eb;
        font-family: Inter, Arial, sans-serif;
      }
      .card {
        width: min(680px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(110, 236, 216, 0.2);
        border-radius: 20px;
        background: rgba(10, 15, 28, 0.72);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      .eyebrow {
        color: #6eecd8;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 56px);
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #a5b4c3;
        font-size: 16px;
      }
      code {
        color: #b490ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Helixa Subdomain</div>
      <h1>nh.helixa.xyz</h1>
      <p>This path is live in the repo and ready for Rendr to build on. Current root: <code>agentdna/nh/</code>.</p>
    </main>
  </body>
</html>
